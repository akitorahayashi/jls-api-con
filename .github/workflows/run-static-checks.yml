# Static Checks Workflow
#
# Runs Biome, typecheck, and bundling, and verifies the committed bundle is in
# sync with source.

name: Run Static Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-static-checks:
    name: Run Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Run Repository Checks
        run: bun run check

      - name: Verify dist is committed
        run: git diff --exit-status dist/openapi.json
