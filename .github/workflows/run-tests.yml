# Test Workflow
#
# Bundles the contract and runs the fixture-conformance tests.

name: Run Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Bundle contract
        run: bun run bundle

      - name: Run Tests
        run: bun test
