name: contract

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Development Environment
        uses: ./.github/actions/setup
      - name: Lint
        run: bun run lint
      - name: Bundle and verify dist is regenerated
        run: |
          bun run bundle
          git diff --exit-status dist/openapi.json
      - name: Validate fixtures
        run: bun run validate:fixtures

  breaking:
    name: Breaking-change gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Development Environment
        uses: ./.github/actions/setup
      - name: Bundle current contract
        run: bun run bundle
      - name: Install oasdiff
        run: curl -fsSL https://raw.githubusercontent.com/oasdiff/oasdiff/main/install.sh | sudo sh
      - name: Breaking-change check against base
        run: |
          base_sha='${{ github.event.pull_request.base.sha }}'
          if git cat-file -e "$base_sha:dist/openapi.json" 2>/dev/null; then
            git show "$base_sha:dist/openapi.json" > "$RUNNER_TEMP/base-openapi.json"
            oasdiff breaking "$RUNNER_TEMP/base-openapi.json" dist/openapi.json --fail-on ERR
          else
            echo "No baseline dist/openapi.json in base commit; skipping breaking-change check."
          fi
